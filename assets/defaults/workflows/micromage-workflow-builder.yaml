name: micromage-workflow-builder
description: |
  Use when: User wants to create a new custom Micromage workflow from a plain-English process description.
  Triggers: "build me a workflow", "create a workflow", "generate a workflow",
            "new workflow", "make a workflow for", "workflow builder".
  Does: Inspects repo context, designs a Micromage-native DAG, pauses for approval,
        writes workflow YAML, validates it, and reports the run command.
  NOT for: Editing existing workflows, adding visual builders, or creating non-workflow files.

provider: opencode
model: opencode/deepseek-v4-flash-free

nodes:
  scan-context:
    type: command
    command: |
      echo "=== Repository ==="
      pwd
      find . -maxdepth 2 -type f \( -name 'AGENTS.md' -o -name 'README.md' -o -name 'go.mod' \) | sort

      echo ""
      echo "=== Default Workflows ==="
      find assets/defaults/workflows -maxdepth 1 -type f \( -name '*.yaml' -o -name '*.yml' \) 2>/dev/null | sort | sed -n '1,80p'

      echo ""
      echo "=== Default Commands ==="
      find assets/defaults/commands -maxdepth 1 -type f -name '*.md' 2>/dev/null | sort | sed -n '1,80p'

      echo ""
      echo "=== Project Skill ==="
      sed -n '1,220p' .agents/skills/micromage/SKILL.md 2>/dev/null || true

  design-workflow:
    type: agent
    prompt: |
      Design a Micromage workflow for this request:

      $ARGUMENTS

      Repository context:

      $scan-context.output

      Produce a concise design for a valid Micromage workflow. Include:
      - workflow name in kebab case, prefixed with micromage- only if it belongs in defaults
      - one-sentence purpose
      - trigger phrases
      - nodes with id, type, purpose, dependencies, and any when/trigger_rule/route behavior
      - where human_gate nodes are needed
      - which nodes should be deterministic command nodes vs provider-backed agent nodes

      Micromage node model:
      - command: deterministic shell command or multiline shell script in command
      - agent: provider-backed reasoning or code work, using prompt or command template
      - human_gate: pauses until approved, usually before risky writes or publishing
      - loop: repeated agent prompt until its until token appears or max_iterations is reached
      - depends_on: DAG edges; independent nodes in the same layer run concurrently
      - when: conditional expression based on prior node output
      - trigger_rule: all_success, one_success, or all_done
      - route.on_failure: jump to an earlier repair node with max_iterations controls
      - $node.output.field: works only when the node output is valid JSON

      Failure-route example:

      ```yaml
      repair:
        type: agent
        prompt: Fix the validation failure using $validate.output
      validate:
        type: command
        command: go test ./...
        depends_on: [repair]
        route:
          on_failure:
            to: repair
            max_iterations: 2
            max_repeated_failures: 2
      ```

      Conditional branch example:

      ```yaml
      classify:
        type: agent
        prompt: |
          Classify the work. End with only JSON like:
          {"path":"bug"}
      bug-path:
        type: agent
        prompt: Fix the bug.
        depends_on: [classify]
        when: "$classify.output.path == 'bug'"
      ```

      Do not use non-Micromage fields such as script, runtime, bash, approval, cancel, or visual-builder concepts.
      Do not assume npm, node, bun, or TypeScript.
    depends_on: [scan-context]

  approve-design:
    type: human_gate
    message: "Review the proposed workflow design. Approve to generate and validate YAML."
    depends_on: [design-workflow]

  generate-yaml:
    type: agent
    prompt: |
      Generate the complete Micromage workflow YAML for this approved design:

      $design-workflow.output

      Original request:

      $ARGUMENTS

      Requirements:
      - Write the file to assets/defaults/workflows/<workflow-name>.yaml unless the design says it is project-specific.
      - Use only Micromage-supported fields: name, description, provider, model, interactive, worktree, nodes.
      - Use mapping-style nodes unless a sequence is clearer.
      - For command nodes, set type: command and command:.
      - For agent nodes, set type: agent and prompt: or command: <template-name>.
      - For human gates, set type: human_gate and message:.
      - For loop nodes, set type: loop and loop.prompt, loop.until, loop.max_iterations.
      - Use depends_on for ordering and parallelism.
      - Use when and trigger_rule where routing is needed.
      - Use route.on_failure only for repair loops that jump to an earlier node.
      - Make classification outputs valid JSON when downstream nodes use $node.output.field.
      - Failure route targets must be earlier in dependency order; Micromage reruns forward from the repair target after a failure.
      - Include one short YAML comment explaining the business reason for any non-obvious gate or route.
      - Do not use npm, node, bun, TypeScript, frontend code, or non-Micromage fields.

      After writing the file, report only:
      - path written
      - workflow name
      - validation command to run
    depends_on: [approve-design]

  validate-generated:
    type: command
    command: |
      set -eu
      NAME=$(printf '%s\n' "$generate-yaml.output" | awk 'tolower($0) ~ /workflow name/ { sub(/.*workflow name[: ]*/, "", $0); print; exit }' | tr -d '`"[:space:]')
      PATH_LINE=$(printf '%s\n' "$generate-yaml.output" | grep -Eo 'assets/defaults/workflows/[A-Za-z0-9._/-]+\.ya?ml' | head -1 || true)

      if [ -n "$PATH_LINE" ]; then
        FILE="$PATH_LINE"
      elif [ -n "$NAME" ] && [ -f "assets/defaults/workflows/$NAME.yaml" ]; then
        FILE="assets/defaults/workflows/$NAME.yaml"
      else
        echo "Could not determine generated workflow path from generator output:"
        printf '%s\n' "$generate-yaml.output"
        exit 1
      fi

      go run ./cmd/micromage validate --workflow "$FILE"
      echo "validated $FILE"
    depends_on: [generate-yaml]

  report:
    type: agent
    prompt: |
      Summarize the generated workflow for the user.

      Generator output:
      $generate-yaml.output

      Validation output:
      $validate-generated.output

      Include:
      - what workflow was created
      - where it was saved
      - what validation passed
      - example foreground run command
      - example detached run command
    depends_on: [validate-generated]
