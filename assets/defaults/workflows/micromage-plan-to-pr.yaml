name: micromage-plan-to-pr
description: |
  Use when: You have an existing implementation plan and want to execute it end-to-end.
  Input: Path to a plan file ($ARTIFACTS_DIR/plan.md or .agents/plans/*.md)
  Output: PR ready for merge with comprehensive review completed

  Full workflow:
  1. Read plan, setup branch, extract scope limits
  2. Verify plan research is still valid
  3. Implement all tasks with type-checking
  4. Run full validation suite
  5. Create PR with template, mark ready
  6. Comprehensive code review (5 parallel agents with scope limit awareness)
  7. Synthesize and fix review findings
  8. Final summary with decision matrix -> GitHub comment + follow-up recommendations

  NOT for: Creating plans from scratch (use micromage-idea-to-pr), quick fixes, standalone reviews.

nodes:
  # ═══════════════════════════════════════════════════════════════════
  # PHASE 1: SETUP
  # ═══════════════════════════════════════════════════════════════════

  - id: plan-setup
    command: micromage-plan-setup
    context: fresh

  # ═══════════════════════════════════════════════════════════════════
  # PHASE 2: CONFIRM PLAN
  # ═══════════════════════════════════════════════════════════════════

  - id: confirm-plan
    command: micromage-confirm-plan
    depends_on: [plan-setup]
    context: fresh

  # ═══════════════════════════════════════════════════════════════════
  # PHASE 3: IMPLEMENT
  # ═══════════════════════════════════════════════════════════════════

  - id: implement-tasks
    command: micromage-implement-tasks
    depends_on: [confirm-plan]
    context: fresh
    provider: claude
    model: large

  # ═══════════════════════════════════════════════════════════════════
  # PHASE 4: VALIDATE
  # ═══════════════════════════════════════════════════════════════════

  - id: validate
    command: micromage-validate
    depends_on: [implement-tasks]
    context: fresh

  # ═══════════════════════════════════════════════════════════════════
  # PHASE 5: FINALIZE PR
  # ═══════════════════════════════════════════════════════════════════

  - id: finalize-pr
    command: micromage-finalize-pr
    depends_on: [validate]
    context: fresh

  # ═══════════════════════════════════════════════════════════════════
  # PHASE 6: CODE REVIEW
  # ═══════════════════════════════════════════════════════════════════

  - id: verify-pr-base
    bash: |
      set -euo pipefail
      EXPECTED="$BASE_BRANCH"
      ACTUAL=$(gh pr view --json baseRefName -q '.baseRefName')
      if [ "$ACTUAL" != "$EXPECTED" ]; then
        PR_NUMBER=$(gh pr view --json number -q '.number')
        echo "Base mismatch on PR #$PR_NUMBER: expected=$EXPECTED actual=$ACTUAL — re-targeting" >&2
        gh pr edit "$PR_NUMBER" --base "$EXPECTED"
      else
        echo "PR base verified: $EXPECTED"
      fi
    depends_on: [finalize-pr]

  - id: review-scope
    command: micromage-pr-review-scope
    depends_on: [verify-pr-base]
    context: fresh

  - id: sync
    command: micromage-sync-pr-with-main
    depends_on: [review-scope]
    context: fresh

  - id: code-review
    command: micromage-code-review-agent
    depends_on: [sync]
    context: fresh

  - id: error-handling
    command: micromage-error-handling-agent
    depends_on: [sync]
    context: fresh

  - id: test-coverage
    command: micromage-test-coverage-agent
    depends_on: [sync]
    context: fresh

  - id: comment-quality
    command: micromage-comment-quality-agent
    depends_on: [sync]
    context: fresh

  - id: docs-impact
    command: micromage-docs-impact-agent
    depends_on: [sync]
    context: fresh

  - id: synthesize
    command: micromage-synthesize-review
    depends_on: [code-review, error-handling, test-coverage, comment-quality, docs-impact]
    trigger_rule: one_success
    context: fresh

  # ═══════════════════════════════════════════════════════════════════
  # PHASE 7: FIX REVIEW ISSUES
  # ═══════════════════════════════════════════════════════════════════

  - id: implement-fixes
    command: micromage-implement-review-fixes
    depends_on: [synthesize]
    context: fresh

  # ═══════════════════════════════════════════════════════════════════
  # PHASE 8: FINAL SUMMARY & FOLLOW-UP
  # ═══════════════════════════════════════════════════════════════════

  - id: workflow-summary
    command: micromage-workflow-summary
    depends_on: [implement-fixes]
    context: fresh
