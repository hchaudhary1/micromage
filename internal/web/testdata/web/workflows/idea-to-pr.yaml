name: idea-to-pr
description: |
  Turn a feature idea into a tested pull request using OpenCode.
  Creates a plan, implements it, validates it, opens a PR, runs parallel review,
  applies high-value fixes, and writes a final summary.
provider: opencode
model: opencode/nemotron-3-ultra-free
tags: [feature, pr, opencode]
nodes:
  - id: create-plan
    command: micromage-create-plan
    context: fresh
    agent: general
    idle_timeout: 60000

  - id: plan-setup
    command: micromage-plan-setup
    depends_on: [create-plan]
    context: fresh
    agent: general
    idle_timeout: 60000

  - id: confirm-plan
    command: micromage-confirm-plan
    depends_on: [plan-setup]
    context: fresh
    agent: general
    idle_timeout: 60000

  - id: implement-tasks
    command: micromage-implement-tasks
    depends_on: [confirm-plan]
    context: fresh
    agent: general
    idle_timeout: 120000

  - id: validate
    command: micromage-validate
    depends_on: [implement-tasks]
    context: fresh
    agent: general
    idle_timeout: 120000

  - id: finalize-pr
    command: micromage-finalize-pr
    depends_on: [validate]
    context: fresh
    agent: general
    idle_timeout: 120000

  - id: verify-pr-base
    bash: |
      set -euo pipefail
      EXPECTED="${BASE_BRANCH:-main}"
      ACTUAL=$(gh pr view --json baseRefName -q '.baseRefName')
      if [ "$ACTUAL" != "$EXPECTED" ]; then
        PR_NUMBER=$(gh pr view --json number -q '.number')
        echo "Base mismatch on PR #$PR_NUMBER: expected=$EXPECTED actual=$ACTUAL; re-targeting" >&2
        gh pr edit "$PR_NUMBER" --base "$EXPECTED"
      else
        echo "PR base verified: $EXPECTED"
      fi
    depends_on: [finalize-pr]

  - id: review-scope
    command: micromage-pr-review-scope
    depends_on: [verify-pr-base]
    context: fresh
    agent: general
    idle_timeout: 60000

  - id: sync
    command: micromage-sync-pr-with-main
    depends_on: [review-scope]
    context: fresh
    agent: general
    idle_timeout: 120000

  - id: code-review
    command: micromage-code-review-agent
    depends_on: [sync]
    context: fresh
    agent: general
    idle_timeout: 120000

  - id: error-handling
    command: micromage-error-handling-agent
    depends_on: [sync]
    context: fresh
    agent: general
    idle_timeout: 120000

  - id: test-coverage
    command: micromage-test-coverage-agent
    depends_on: [sync]
    context: fresh
    agent: general
    idle_timeout: 120000

  - id: comment-quality
    command: micromage-comment-quality-agent
    depends_on: [sync]
    context: fresh
    agent: general
    idle_timeout: 120000

  - id: docs-impact
    command: micromage-docs-impact-agent
    depends_on: [sync]
    context: fresh
    agent: general
    idle_timeout: 120000

  - id: synthesize
    command: micromage-synthesize-review
    depends_on: [code-review, error-handling, test-coverage, comment-quality, docs-impact]
    trigger_rule: one_success
    context: fresh
    agent: general
    idle_timeout: 120000

  - id: implement-fixes
    command: micromage-implement-review-fixes
    depends_on: [synthesize]
    context: fresh
    agent: general
    idle_timeout: 120000

  - id: workflow-summary
    command: micromage-workflow-summary
    depends_on: [implement-fixes]
    context: fresh
    agent: general
    idle_timeout: 60000
