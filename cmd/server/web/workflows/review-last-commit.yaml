name: review-last-commit
description: |
  Review HEAD with five parallel specialist agents, then synthesize findings.
  This workflow gathers git context locally and does not create branches, commits, pushes, or PRs.
provider: opencode
model: opencode/nemotron-3-ultra-free
tags: [review, git, opencode]
nodes:
  - id: collect-context
    bash: |
      set -eu
      REVIEW_DIR="$ARTIFACTS_DIR/review-last-commit"
      CONTEXT="$REVIEW_DIR/context.md"
      mkdir -p "$REVIEW_DIR"

      {
        echo "# Last Commit Review Context"
        echo
        echo "## Repo Instructions"
        sed -n '1,120p' AGENTS.md 2>/dev/null || true
        echo
        if git rev-parse --verify HEAD >/dev/null 2>&1; then
          echo "## Commit"
          git show --stat --oneline --decorate --no-renames HEAD
          echo
          echo "## Changed Files"
          git show --name-status --format= HEAD
          echo
          echo "## Diff"
          if git rev-parse --verify HEAD^ >/dev/null 2>&1; then
            git diff --no-ext-diff --find-renames HEAD^ HEAD
          else
            git show --no-ext-diff --find-renames --format= HEAD
          fi
        else
          echo "## Commit"
          echo "No commits found on HEAD."
        fi
      } > "$CONTEXT"

      # Review scope is captured once so every specialist reviews the same commit.
      cat "$CONTEXT"

  - id: code-review
    prompt: |
      Review the last commit for correctness bugs, maintainability risks, and project-rule violations.
      Use only the shared context below. Do not read files, run commands, or use tools.
      Shared context:
      $collect-context.output

      Return the findings as Markdown; Micromage will store them in $ARTIFACTS_DIR/review-last-commit/code-review-findings.md.
      Do not quote the full context, diff, or source files; include only concise findings.
      Use severity, file references, and concrete fixes. If there are no findings, write that clearly.
    depends_on: [collect-context]
    outputs:
      - $ARTIFACTS_DIR/review-last-commit/code-review-findings.md
    context: fresh
    agent: general
    idle_timeout: 120000

  - id: error-handling
    prompt: |
      Review the last commit for missing error handling, unsafe command behavior, failed-edge behavior, and confusing failure modes.
      Use only the shared context below. Do not read files, run commands, or use tools.
      Shared context:
      $collect-context.output

      Return the findings as Markdown; Micromage will store them in $ARTIFACTS_DIR/review-last-commit/error-handling-findings.md.
      Do not quote the full context, diff, or source files; include only concise findings.
      Use severity, file references, and concrete fixes. If there are no findings, write that clearly.
    depends_on: [collect-context]
    outputs:
      - $ARTIFACTS_DIR/review-last-commit/error-handling-findings.md
    context: fresh
    agent: general
    idle_timeout: 120000

  - id: test-coverage
    prompt: |
      Review whether the last commit has enough tests and keeps the project near its coverage goals.
      Use only the shared context below. Do not read files, run commands, or use tools.
      Shared context:
      $collect-context.output

      Return the findings as Markdown; Micromage will store them in $ARTIFACTS_DIR/review-last-commit/test-coverage-findings.md.
      Do not quote the full context, diff, or source files; include only concise findings.
      Focus on missing tests that would catch real regressions. If coverage looks sufficient, write that clearly.
    depends_on: [collect-context]
    outputs:
      - $ARTIFACTS_DIR/review-last-commit/test-coverage-findings.md
    context: fresh
    agent: general
    idle_timeout: 120000

  - id: comment-quality
    prompt: |
      Review comments added or changed by the last commit.
      Use only the shared context below. Do not read files, run commands, or use tools.
      Shared context:
      $collect-context.output

      Return the findings as Markdown; Micromage will store them in $ARTIFACTS_DIR/review-last-commit/comment-quality-findings.md.
      Do not quote the full context, diff, or source files; include only concise findings.
      Check that comments explain business intent instead of syntax. If comments look sufficient, write that clearly.
    depends_on: [collect-context]
    outputs:
      - $ARTIFACTS_DIR/review-last-commit/comment-quality-findings.md
    context: fresh
    agent: general
    idle_timeout: 120000

  - id: docs-impact
    prompt: |
      Review whether the last commit changes user-facing behavior, workflows, commands, environment variables, or docs expectations.
      Use only the shared context below. Do not read files, run commands, or use tools.
      Shared context:
      $collect-context.output

      Return the findings as Markdown; Micromage will store them in $ARTIFACTS_DIR/review-last-commit/docs-impact-findings.md.
      Do not quote the full context, diff, or source files; include only concise findings.
      Call out required README, docs, or template updates. If no docs change is needed, write that clearly.
    depends_on: [collect-context]
    outputs:
      - $ARTIFACTS_DIR/review-last-commit/docs-impact-findings.md
    context: fresh
    agent: general
    idle_timeout: 120000

  - id: synthesize
    prompt: |
      Synthesize the last-commit review.

      Shared context:
      $collect-context.output

      Reviewer outputs:
      code-review:
      $code-review.output

      error-handling:
      $error-handling.output

      test-coverage:
      $test-coverage.output

      comment-quality:
      $comment-quality.output

      docs-impact:
      $docs-impact.output

      Use the reviewer outputs above, deduplicate findings, prioritize real bugs and missing tests, and return the consolidated review as Markdown. Micromage will store it in $ARTIFACTS_DIR/review-last-commit/consolidated-review.md.
      Do not quote the full context, diff, or source files; include only the final review.
      Do not create branches, commits, pushes, or PRs.
    depends_on: [code-review, error-handling, test-coverage, comment-quality, docs-impact]
    trigger_rule: one_success
    outputs:
      - $ARTIFACTS_DIR/review-last-commit/consolidated-review.md
    context: fresh
    agent: general
    idle_timeout: 120000
