name: parallel-review
description: Produce an implementation, review it from two angles, then merge the findings.
nodes:
  - id: implement
    prompt: |
      Implement the requested feature with tests.

  - id: security-review
    prompt: |
      Review the implementation for security and privacy concerns.
    depends_on: [implement]
    skills: [security]

  - id: quality-review
    prompt: |
      Review the implementation for maintainability and test gaps.
    depends_on: [implement]
    skills: [code-review]

  - id: merge-findings
    prompt: |
      Combine the review findings into a final action list.
    depends_on: [security-review, quality-review]
    trigger_rule: none_failed_min_one_success
