{{define "index.html"}}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{.Title}}</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand-lockup" aria-label="{{.Title}}">
      <span class="brand-mark" aria-hidden="true"></span>
      <div>
        <h1>{{.Title}}</h1>
        <p id="workflow-summary">Loading templates</p>
      </div>
      </div>

      <div class="toolbar">
        <select id="template-select" aria-label="Workflow template"></select>
        <input id="run-arguments" type="text" placeholder="Feature input" aria-label="Workflow input">
        <select id="run-mode" aria-label="Run mode">
          <option value="simulate">Simulate</option>
          <option value="real">Real</option>
        </select>
        <span id="preview-state" class="state-pill">Preview</span>
        <button id="run-button" type="button" disabled>Run</button>
        <button id="cancel-run-button" type="button" disabled>Cancel</button>
      </div>
    </header>

    <main class="workspace">
      <section class="editor-pane" aria-label="YAML editor">
        <textarea id="yaml-editor" spellcheck="false"></textarea>
      </section>

      <section class="graph-pane" aria-label="Workflow graph">
        <div class="graph-header">
          <div>
            <h2 id="workflow-name">Workflow</h2>
            <p id="workflow-description"></p>
            <p id="run-status">No run active</p>
          </div>
          <div class="graph-actions">
            <button id="fit-graph-button" type="button">Fit</button>
            <div id="issue-counts" class="issue-counts"></div>
          </div>
        </div>

        <section id="issue-panel" class="issue-panel empty" aria-label="Preview issues"></section>

        <div class="graph-wrap">
          <svg id="dag-svg" role="img" aria-label="DAG preview"></svg>
        </div>

        <div class="bottom-panels">
          <section class="inspector" aria-label="Selected node">
            <h3>Inspector</h3>
            <div id="inspector-body" class="panel-body muted">Select a node</div>
          </section>
          <section class="run-log" aria-label="Run log">
            <h3>Run log</h3>
            <div id="run-log" class="panel-body log-lines"></div>
          </section>
          <section class="persistence-panel" aria-label="Persistence">
            <div class="panel-heading-row">
              <h3>Persistence</h3>
              <button id="refresh-persistence-button" type="button">Refresh</button>
            </div>
            <div class="panel-body persistence-body">
              <div class="definition-save-row">
                <select id="definition-kind" aria-label="Save kind">
                  <option value="workflow">Workflow</option>
                  <option value="template">Template</option>
                </select>
                <input id="definition-id" type="text" aria-label="Save ID" placeholder="workflow-id">
                <button id="save-definition-button" type="button">Save</button>
              </div>
              <div class="persistence-columns">
                <section aria-label="Saved workflows and templates">
                  <h4>Saved</h4>
                  <div id="definition-list" class="persistence-list"></div>
                </section>
                <section aria-label="Run history">
                  <div class="section-title-row">
                    <h4>Runs</h4>
                    <button id="cleanup-preview-button" type="button">Cleanup Preview</button>
                  </div>
                  <div id="run-history-list" class="persistence-list"></div>
                </section>
              </div>
              <div id="cleanup-preview" class="persistence-detail muted">No cleanup preview</div>
              <div id="run-detail" class="persistence-detail muted">Select a run</div>
            </div>
          </section>
        </div>
      </section>
    </main>
  </div>

  <script src="/static/app_state.js"></script>
  <script src="/static/app.js"></script>
</body>
</html>
{{end}}
