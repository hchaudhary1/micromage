{{define "index.html"}}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{.Title}}</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand-lockup" aria-label="{{.Title}}">
      <span class="brand-mark" aria-hidden="true"></span>
      <div>
        <h1>{{.Title}}</h1>
        <p id="workflow-summary">Loading templates</p>
      </div>
      </div>

      <div class="toolbar">
        <select id="template-select" aria-label="Workflow template"></select>
        <input id="run-arguments" type="text" placeholder="Feature input" aria-label="Workflow input">
        <select id="run-mode" aria-label="Run mode">
          <option value="simulate">Simulate</option>
          <option value="real">Real</option>
        </select>
        <span id="preview-state" class="state-pill">Preview</span>
        <button id="run-button" type="button" disabled>Run</button>
      </div>
    </header>

    <main class="workspace">
      <section class="editor-pane" aria-label="YAML editor">
        <textarea id="yaml-editor" spellcheck="false"></textarea>
      </section>

      <section class="graph-pane" aria-label="Workflow graph">
        <div class="graph-header">
          <div>
            <h2 id="workflow-name">Workflow</h2>
            <p id="workflow-description"></p>
          </div>
          <div id="issue-counts" class="issue-counts"></div>
        </div>

        <div class="graph-wrap">
          <svg id="dag-svg" role="img" aria-label="DAG preview"></svg>
        </div>

        <div class="bottom-panels">
          <section class="inspector" aria-label="Selected node">
            <h3>Inspector</h3>
            <div id="inspector-body" class="panel-body muted">Select a node</div>
          </section>
          <section class="run-log" aria-label="Run log">
            <h3>Run log</h3>
            <div id="run-log" class="panel-body log-lines"></div>
          </section>
        </div>
      </section>
    </main>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
{{end}}
