name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (for example v0.2.3)"
        required: true
        type: string
      publish_release:
        description: "Create a GitHub release with artifacts"
        required: false
        default: true
        type: boolean

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  resolve-version:
    name: Resolve release version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.value }}
      tag: ${{ steps.version.outputs.tag }}
      commit: ${{ steps.version.outputs.commit }}
    steps:
      - id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ inputs.version }}"
          else
            tag="${{ github.ref_name }}"
          fi
          if [ -z "$tag" ]; then
            echo "Could not determine release tag" >&2
            exit 1
          fi
          version="${tag#v}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "value=$version" >> "$GITHUB_OUTPUT"
          echo "commit=${{ github.sha }}" >> "$GITHUB_OUTPUT"

  build:
    name: Build release artifacts
    needs: resolve-version
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            target: linux-amd64
            ext: ""
            archive: tar.gz
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
            target: linux-arm64
            ext: ""
            archive: tar.gz
          - os: macos-latest
            goos: darwin
            goarch: amd64
            target: darwin-amd64
            ext: ""
            archive: tar.gz
          - os: macos-latest
            goos: darwin
            goarch: arm64
            target: darwin-arm64
            ext: ""
            archive: tar.gz
          - os: windows-latest
            goos: windows
            goarch: amd64
            target: windows-amd64
            ext: ".exe"
            archive: zip
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build binary
        shell: bash
        env:
          VERSION: ${{ needs.resolve-version.outputs.version }}
          COMMIT: ${{ needs.resolve-version.outputs.commit }}
        run: |
          short_commit="${COMMIT::8}"
          build_date="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          output="dist/micromage-${{ matrix.target }}${{ matrix.ext }}"
          mkdir -p dist
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
            go build \
              -trimpath \
              -ldflags="-s -w -X main.buildVersion=${VERSION} -X main.buildCommit=${short_commit} -X main.buildDate=${build_date}" \
              -o "$output" \
              ./cmd/server

      - name: Package archive
        shell: bash
        env:
          VERSION: ${{ needs.resolve-version.outputs.version }}
        run: |
          package="micromage-${VERSION}-${{ matrix.target }}"
          archive="${package}.${{ matrix.archive }}"
          mkdir -p "dist/$package"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            cp "dist/micromage-${{ matrix.target }}.exe" "dist/$package/micromage.exe"
          else
            cp "dist/micromage-${{ matrix.target }}" "dist/$package/micromage"
          fi
          cp LICENSE SECURITY.md README.md "dist/$package/"
          mkdir -p "dist/$package/docs"
          cp docs/operator-security.md docs/release.md "dist/$package/docs/"
          if [ "${{ matrix.archive }}" = "zip" ]; then
            (cd dist && zip -qr "$archive" "$package")
          else
            (cd dist && tar -czf "$archive" "$package")
          fi

      - name: Validate version endpoint
        if: matrix.goos == 'linux' && matrix.goarch == 'amd64'
        run: |
          if [ "${{ matrix.os }}" != "ubuntu-latest" ]; then
            echo "skip non-linux smoke on this matrix entry"
            exit 0
          fi
          chmod +x "dist/micromage-${{ matrix.target }}"
          metadata=$(./dist/micromage-${{ matrix.target }} --version)
          if ! echo "$metadata" | grep -q '"version"'; then
            echo "Expected JSON build metadata from --version" >&2
            exit 1
          fi

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: "release-${{ matrix.target }}"
          path: |
            dist/micromage-${{ matrix.target }}${{ matrix.ext }}
            dist/micromage-${{ needs.resolve-version.outputs.version }}-${{ matrix.target }}.${{ matrix.archive }}
          if-no-files-found: error

  release:
    name: Publish GitHub release
    needs: [resolve-version, build]
    if: ${{ github.event_name == 'push' || inputs.publish_release }}
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          shopt -s nullglob
          archives=(micromage-*.*)
          if [ ${#archives[@]} -eq 0 ]; then
            echo "No release artifacts found" >&2
            exit 1
          fi
          sha256sum "${archives[@]}" > SHA256SUMS
          cat SHA256SUMS

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve-version.outputs.tag }}
          name: "Micromage ${{ needs.resolve-version.outputs.tag }}"
          files: |
            dist/micromage-*
            dist/SHA256SUMS
          fail_on_unmatched_files: true
